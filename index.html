<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">

<!-- The Lucky Wheel Container -->
<div class="relative w-[340px] h-[340px] md:w-[500px] md:h-[500px] flex items-center justify-center z-20">
<!-- External Decorative Border -->

<!-- Wheel Frame with Lights -->

<!-- Decorative lights dots -->

<div class="absolute inset-0 rotate-90"><div class="absolute top-1 left-1/2 -translate-x-1/2 w-3 h-3 bg-secondary-container rounded-full shadow-[0_0_8px_#fdc003]"></div></div>

<div class="absolute inset-0 rotate-180"><div class="absolute top-1 left-1/2 -translate-x-1/2 w-3 h-3 bg-secondary-container rounded-full shadow-[0_0_8px_#fdc003]"></div></div>

                    QUAY<br/>NGAY

<div class="fixed inset-0 z-[100] flex items-center justify-center bg-on-background/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-500" id="result-modal">
<div class="bg-surface p-8 rounded-lg max-w-sm w-full mx-4 shadow-2xl border-2 border-primary-container text-center scale-90 transition-transform duration-500 transform">
<div class="absolute inset-0 -z-10 bg-[radial-gradient(circle,rgba(253,192,3,0.3)_0%,transparent_70%)] animate-spin opacity-50" id="modal-sunburst" style="animation-duration: 10s"></div>
<div class="mb-4 flex justify-center">
<div class="w-24 h-24 bg-primary-container/10 rounded-full flex items-center justify-center p-4">
<span class="material-symbols-outlined text-primary text-[64px]" style="font-variation-settings: 'FILL' 1;">celebration</span>
</div>
</div>
<h3 class="font-headline-lg text-primary mb-2 uppercase tracking-tighter">CHÚC MỪNG!</h3>
<p class="font-headline-lg-mobile text-on-surface mb-6" id="winner-text">Bạn đã trúng một giải thưởng!</p>
<button class="w-full bg-primary text-white font-bold py-4 rounded-full shadow-lg hover:brightness-110 active:scale-95 transition-all" onclick="closeModal()">
                NHẬN NGAY
            </button>
</div>
</div>
<script>
        const wheel = document.getElementById('wheel-canvas');
        const btn = document.getElementById('spin-btn');
        const modal = document.getElementById('result-modal');
        const modalContent = modal.querySelector('div');
        const winnerText = document.getElementById('winner-text');
        const wheelSvg = document.getElementById('wheel-svg');
        const prizeIcons = document.getElementById('prize-icons');
        
        let currentRotation = 0;
        let isSpinning = false;

        const prizeSegments = [
            {
                id: 'xe-may',
                name: 'Xe Máy Cao Cấp',
                color: '#af101a',
                type: 'image',
                content: 'https://lh3.googleusercontent.com/aida-public/AB6AXuCOSZxAGEwAg_g3rbuOmSe072V3mxX45ssxvgL43JeG-iPLQj8E0qYJaSiCj9farGLKYJksVnDKvFBHnWzDm8-GLlxDkYNAab4HYiXigM-SBc7HWVDJh-0M7uPmrCMs85iJo5apaIBqEFiKhgymNHTyJg2EmoyamIXQqJE0t8CRIYZtuRaZRLR5gfA7PEq44mSnUjGTMHTOpf_FI0yGAlSFgzE7RktcGO2ZQu7cmgRq1dwYalMDPP2ILjU-JACF-tPTBFR78GmDUeU'
            },
            {
                id: 'cong-tac-den-xe',
                name: 'Công Tắc Đèn Xe',
                color: '#005a98',
                type: 'image',
                content: 'den.jpeg'
            },
            {
                id: 'dien-thoai',
                name: 'Điện Thoại Luxury',
                color: '#6a1b9a',
                type: 'image',
                content: 'https://lh3.googleusercontent.com/aida-public/AB6AXuAbdmuqJ1ZQBY-0ztvGtwnDs4SW9NFcysrVrKAiBOyX5QlFZODDz0PPv3hZdUWAuqTh6TQd4cdSDhC8RIm8gBWkiP_U-S-BwO-Cq4XA6PO9KvMIIl8qX5TLORE3gxmGCOAP4wP42cSeEkO6JNff7qdCdHmCYFVGwirO4SeYiQHz0OaERuDaGlehKgMOtasAFDxBFnIniGXyt_fjtQD9ARIUK_qSD1N5Ubeikj4U4xjc2hcbnjS1Pk3dHQclmAZ6f0QDxOPPMiPogpk'
            },
            {
                id: 'dau-may',
                name: 'Dầu Máy',
                color: '#008080',
                type: 'image',
                content: 'https://lh3.googleusercontent.com/aida-public/AB6AXuBSNBjUiugvoFOVkQokh-mZma39bgGVy-sILbqfd22ayAqQ6h2PlpbM82VY85VvXPfMaLXxizFrgu9chiXjrbFmdsD_dT1YZ_RD3l2aQW-S6IqaVVUWFbvCL4fYR3LSzoqujcW31hpWvCL_DoA_FDsR7c4lcdhCosyOg3b4k4ETTkga7M7IruS4AJBOYoXFZLUVr8DzwpCqeMJVEGf8yElspfgNUvr4-NiVlPPq4joLqVZZPNi8oNPEVywmmAyCTHgHVfQeEa0RozM'
            },
            {
                id: 'tai-nghe',
                name: 'Tai Nghe Pro',
                color: '#355f9d',
                type: 'image',
                content: 'https://lh3.googleusercontent.com/aida-public/AB6AXuAMw1Q2x1meJtooiF6NWyb9qUyrtSDyIHcpRdHm0qb6hSjqbDmG9f5kxBUKsPQQ8XTwUeaFneVrAT8Xoy_GPB4mWHS4VrW4jbdK_KfUAwc7E-WeVriPq09fgBTJojvsopRkJ-U5RqP6rTiShaNHy4CiM1NOGXPkl1GwDHL4A1dNKUWnFb-BR_OKBQcXmBPEHKZWaauAz1mfqcz4lFeba5rPV9b4u-ptGPtZZwEHj9Vx18ADNvlXU1XDxcpzrEhivIaUVduwQTvCJ9M'
            },
            {
                id: 'tham-chan',
                name: 'Thảm Chân',
                color: '#7a2f20',
                type: 'image',
                content: 'tham.jpeg'
            },
            {
                id: 'chuc-may-man',
                name: 'Chúc Bạn May Mắn',
                color: '#fdc003',
                type: 'text',
                content: 'Chúc bạn<br/>may mắn'
            }
        ];

        const weightedPrizes = [
            { id: 'cong-tac-den-xe', weight: 5 },
            { id: 'tham-chan', weight: 5 },
            { id: 'dau-may', weight: 45 },
            { id: 'chuc-may-man', weight: 45 }
        ];

        function toRadians(degrees) {
            return degrees * Math.PI / 180;
        }

        function pointOnWheel(degrees, radius = 50) {
            const radians = toRadians(degrees);
            return {
                x: 50 + radius * Math.cos(radians),
                y: 50 + radius * Math.sin(radians)
            };
        }

        function segmentPath(startAngle, endAngle) {
            const start = pointOnWheel(startAngle);
            const end = pointOnWheel(endAngle);
            const largeArcFlag = endAngle - startAngle > 180 ? 1 : 0;
            return `M 50 50 L ${start.x.toFixed(2)} ${start.y.toFixed(2)} A 50 50 0 ${largeArcFlag} 1 ${end.x.toFixed(2)} ${end.y.toFixed(2)} Z`;
        }

        function createPrizeMarkup(prize) {
            if (prize.type === 'image') {
                return `<img alt="${prize.name}" src="${prize.content}"/>`;
            }

            if (prize.type === 'svg') {
                return prize.content;
            }

            return `<span class="wheel-prize-text">${prize.content}</span>`;
        }

        function renderWheel() {
            const segmentSize = 360 / prizeSegments.length;
            wheelSvg.innerHTML = '';
            prizeIcons.innerHTML = '';

            prizeSegments.forEach((prize, index) => {
                const startAngle = -90 + index * segmentSize;
                const endAngle = startAngle + segmentSize;
                const centerAngle = startAngle + segmentSize / 2;
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', segmentPath(startAngle, endAngle));
                path.setAttribute('fill', prize.color);
                path.setAttribute('stroke', 'white');
                path.setAttribute('stroke-width', '0.55');
                wheelSvg.appendChild(path);

                const position = pointOnWheel(centerAngle, 30);
                const marker = document.createElement('div');
                marker.className = 'wheel-prize-marker absolute';
                marker.style.left = `${position.x}%`;
                marker.style.top = `${position.y}%`;
                marker.style.transform = 'translate(-50%, -50%)';
                marker.innerHTML = `<div class="wheel-prize-badge">${createPrizeMarkup(prize)}</div>`;
                prizeIcons.appendChild(marker);
            });
        }

        function getPrizeStopAngle(prizeIndex) {
            const segmentSize = 360 / prizeSegments.length;
            const centerAngle = -90 + prizeIndex * segmentSize + segmentSize / 2;
            return (-90 - centerAngle + 360) % 360;
        }

        function getWinningPrizeIndex() {
            const roll = Math.random() * 100;
            let total = 0;
            const selected = weightedPrizes.find((prize) => {
                total += prize.weight;
                return roll < total;
            }) || weightedPrizes[weightedPrizes.length - 1];

            return prizeSegments.findIndex((prize) => prize.id === selected.id);
        }

        renderWheel();

        btn.addEventListener('click', () => {
            if (isSpinning) return;

            isSpinning = true;
            const prizeIndex = getWinningPrizeIndex();
            const extraRounds = 5 + Math.floor(Math.random() * 5);
            const currentAngle = currentRotation % 360;
            const stopAngle = getPrizeStopAngle(prizeIndex);
            const angleToTarget = (stopAngle - currentAngle + 360) % 360;
            const totalRotation = extraRounds * 360 + angleToTarget;
            
            currentRotation += totalRotation;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                showWinner(prizeSegments[prizeIndex].name);
            }, 10000);
        });

        function showWinner(prize) {
            winnerText.innerText = `Bạn đã trúng:\n${prize}`;
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-90');
            modalContent.classList.add('scale-100');
        }

        function closeModal() {
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-90');
        }
    </script>
</body></html>
